<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Cottage Racer</title><body style="margin:0;background:#10170c;color:#f5edcf;font-family:monospace;display:grid;place-items:center;height:100vh"><b>LOADING COTTAGE RACER…</b><script>Promise.all(Array.from({length:8},(_,i)=>fetch(`part${String(i).padStart(2,'0')}.txt`).then(r=>{if(!r.ok)throw Error(r.status);return r.text()}))).then(p=>{document.open();document.write(p.join(''));document.close()}).catch(e=>document.body.innerHTML='<b>THE KARTS FELL OFF THE TRAILER.<br>'+e+'</b>')</script>
